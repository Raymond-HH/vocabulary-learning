<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoEnglish 词汇学习</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

    .dashboard { max-width:600px; margin:0 auto; padding:24px 16px; }
    .dashboard h1 { font-size:22px; margin-bottom:4px; }
    .dashboard .subtitle { color:#64748b; font-size:14px; margin-bottom:24px; }

    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .stat-card { background:#1e293b; border-radius:12px; padding:16px; text-align:center; }
    .stat-card .num { font-size:28px; font-weight:700; }
    .stat-card .label { font-size:12px; color:#64748b; margin-top:4px; }
    .stat-card.overdue .num { color:#ef4444; }
    .stat-card.new .num { color:#3b82f6; }
    .stat-card.mastered .num { color:#22c55e; }

    .mastery-bar { display:flex; gap:2px; margin-bottom:24px; border-radius:8px; overflow:hidden; height:8px; }
    .mastery-bar div { height:100%; }

    .mode-section { margin-bottom:20px; }
    .mode-section .label { font-size:13px; color:#64748b; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
    .mode-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .mode-btn {
      padding:12px 8px; border:1px solid #334155; border-radius:10px;
      background:#1e293b; color:#cbd5e1; font-size:14px; font-weight:500;
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .mode-btn:hover { background:#334155; }
    .mode-btn.active { border-color:#3b82f6; background:#1e3a5f; color:#60a5fa; }
    .mode-btn .icon { font-size:20px; display:block; margin-bottom:4px; }

    .actions { display:flex; flex-direction:column; gap:12px; }
    .action-btn {
      padding:20px 24px; border:1px solid #334155; border-radius:14px;
      background:#1e293b; color:#e2e8f0; font-size:16px; font-weight:500;
      cursor:pointer; transition:all .15s; text-align:left; width:100%;
    }
    .action-btn:hover { background:#334155; }
    .action-btn.primary { border-color:#3b82f6; background:#1e3a5f; }
    .action-btn.primary:hover { background:#1e4a7a; }
    .action-btn .title { display:block; }
    .action-btn .desc { display:block; font-size:13px; color:#64748b; margin-top:4px; }

    .review { display:none; flex-direction:column; align-items:center; min-height:100vh; padding:16px; }
    .review.active { display:flex; }

    .review-header { width:100%; max-width:600px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .review-header .back { background:none; border:none; color:#64748b; font-size:14px; cursor:pointer; padding:8px; }
    .review-header .progress { font-size:14px; color:#64748b; }

    .progress-track { width:100%; max-width:600px; height:4px; background:#1e293b; border-radius:2px; margin-bottom:24px; }
    .progress-track .fill { height:100%; background:#3b82f6; border-radius:2px; transition:width .3s; }

    .mode-indicator { font-size:12px; color:#3b82f6; background:#1e3a5f; padding:3px 10px; border-radius:6px; margin-bottom:12px; }

    .card {
      width:100%; max-width:600px; background:#1e293b; border-radius:16px;
      padding:40px 28px; margin-bottom:20px;
      box-shadow:0 4px 24px rgba(0,0,0,.3); transition:all .2s; position:relative;
    }
    .card .badge { position:absolute; top:12px; right:12px; font-size:11px; padding:3px 8px; border-radius:6px; background:#334155; color:#94a3b8; }
    .card .word { font-size:30px; font-weight:700; color:#f8fafc; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
    .card .phonetic { font-size:17px; color:#64748b; margin-bottom:4px; }
    .card .pos { font-size:13px; color:#475569; margin-bottom:14px; }
    .card .tags { display:flex; gap:6px; flex-wrap:wrap; }
    .card .tag { font-size:11px; padding:2px 8px; border-radius:5px; background:#334155; color:#cbd5e1; }

    .card .answer { margin-top:24px; padding-top:20px; border-top:1px solid #334155; }
    .card .answer .section { margin-bottom:14px; }
    .card .answer .section-title { font-size:12px; color:#475569; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .card .answer .section-body { font-size:15px; line-height:1.7; color:#94a3b8; white-space:pre-wrap; }

    .hint { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:13px; color:#475569; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .score-row { display:flex; gap:8px; justify-content:center; }
    .score-btn {
      width:56px; height:56px; border:none; border-radius:12px; font-weight:700;
      font-size:20px; cursor:pointer; color:#fff; transition:all .12s;
    }
    .score-btn:active { transform:scale(.93); }
    .score-btn:hover { opacity:.85; }
    .s1 { background:#dc2626; } .s2 { background:#ea580c; } .s3 { background:#ca8a04; }
    .s4 { background:#16a34a; } .s5 { background:#2563eb; }

    .score-labels { display:flex; gap:8px; justify-content:center; margin-top:8px; }
    .score-labels span { width:56px; text-align:center; font-size:10px; color:#64748b; }

    /* Audio controls */
    .audio-controls { display:flex; align-items:center; gap:8px; }
    .audio-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border:none; border-radius:8px;
      background:#334155; color:#60a5fa; font-size:18px;
      cursor:pointer; transition:all .15s; flex-shrink:0;
    }
    .audio-btn:hover { background:#475569; }
    .audio-btn.playing { background:#1e3a5f; animation:glow 1s infinite; }
    @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)} 50%{box-shadow:0 0 0 6px rgba(59,130,246,0)} }

    .speed-btn {
      padding:4px 10px; border:1px solid #475569; border-radius:6px;
      background:transparent; color:#94a3b8; font-size:12px;
      cursor:pointer; transition:all .15s;
    }
    .speed-btn.active { border-color:#3b82f6; color:#60a5fa; background:#1e3a5f; }

    .replay-row { text-align:center; margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .replay-text { font-size:13px; color:#64748b; }

    .fib-sentence { font-size:20px; line-height:1.8; color:#f8fafc; margin-bottom:24px; }
    .fib-sentence .blank { display:inline-block; border-bottom:2px solid #3b82f6; min-width:100px; padding:0 8px; color:#3b82f6; font-weight:600; }

    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .option-btn {
      padding:16px 20px; border:2px solid #334155; border-radius:12px;
      background:#0f172a; color:#e2e8f0; font-size:16px; font-weight:500;
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .option-btn:hover:not(.disabled) { border-color:#3b82f6; background:#1e3a5f; }
    .option-btn.correct { border-color:#22c55e; background:#166534; color:#bbf7d0; }
    .option-btn.wrong { border-color:#ef4444; background:#7f1d1d; color:#fca5a5; }
    .option-btn.disabled { cursor:default; opacity:.6; }

    .fib-hint { text-align:center; color:#64748b; font-size:14px; margin-top:8px; }

    .input-area { display:flex; gap:10px; justify-content:center; margin-bottom:16px; }
    .word-input {
      padding:14px 20px; border:2px solid #334155; border-radius:12px;
      background:#0f172a; color:#f8fafc; font-size:20px; font-weight:500;
      width:280px; text-align:center; outline:none; letter-spacing:1px;
    }
    .word-input:focus { border-color:#3b82f6; }
    .word-input.correct { border-color:#22c55e; background:#166534; }
    .word-input.wrong { border-color:#ef4444; background:#7f1d1d; }

    .submit-btn {
      padding:14px 28px; border:none; border-radius:12px;
      background:#3b82f6; color:#fff; font-size:16px; font-weight:600;
      cursor:pointer; transition:all .15s;
    }
    .submit-btn:hover { background:#2563eb; }
    .submit-btn:disabled { opacity:.5; cursor:default; }

    .result-msg { text-align:center; font-size:16px; font-weight:600; margin-bottom:12px; min-height:24px; }
    .result-msg.correct { color:#22c55e; }
    .result-msg.wrong { color:#ef4444; }

    .def-hint { text-align:center; color:#94a3b8; font-size:18px; margin-bottom:20px; line-height:1.6; }
    .letter-hint { text-align:center; font-size:28px; font-weight:700; color:#3b82f6; letter-spacing:6px; margin-bottom:20px; font-family:monospace; }
    .phonetic-hint { text-align:center; color:#64748b; font-size:16px; margin-bottom:16px; }

    .next-btn {
      display:block; margin:0 auto; padding:12px 32px; border:none; border-radius:10px;
      background:#334155; color:#e2e8f0; font-size:15px; font-weight:500;
      cursor:pointer; transition:all .15s;
    }
    .next-btn:hover { background:#475569; }

    .summary { display:none; max-width:600px; margin:0 auto; padding:40px 16px; text-align:center; }
    .summary.active { display:block; }
    .summary h2 { font-size:28px; margin-bottom:8px; }
    .summary .avg { font-size:56px; font-weight:700; color:#3b82f6; }
    .summary .avg-label { font-size:14px; color:#64748b; margin-bottom:24px; }
    .summary .list { text-align:left; }
    .summary .item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #1e293b; }
    .summary .item .score { font-weight:600; }

    .hidden { display:none!important; }

    @media (max-width:480px) {
      .stats-grid { grid-template-columns:repeat(2,1fr); }
      .mode-row { grid-template-columns:repeat(2,1fr); }
      .score-btn { width:48px; height:48px; font-size:18px; }
      .score-labels span { width:48px; }
      .card { padding:30px 20px; }
      .card .word { font-size:24px; }
      .options-grid { grid-template-columns:1fr; }
      .word-input { width:220px; font-size:17px; }
      .letter-hint { font-size:22px; letter-spacing:4px; }
    }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <h1>AutoEnglish 词汇学习</h1>
    <p class="subtitle" id="subtitle">Loading...</p>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="mastery-bar" id="masteryBar"></div>

    <div class="mode-section">
      <div class="label">学习模式</div>
      <div class="mode-row">
        <button class="mode-btn active" data-mode="flashcard" onclick="selectMode('flashcard')"><span class="icon">🃏</span>闪卡</button>
        <button class="mode-btn" data-mode="fillblank" onclick="selectMode('fillblank')"><span class="icon">📝</span>填空</button>
        <button class="mode-btn" data-mode="dictation" onclick="selectMode('dictation')"><span class="icon">🎧</span>听写</button>
        <button class="mode-btn" data-mode="spelling" onclick="selectMode('spelling')"><span class="icon">🔤</span>拼写</button>
      </div>
    </div>

    <div class="actions">
      <button class="action-btn primary" onclick="startSession('daily')">
        <span class="title">📚 今日学习计划</span>
        <span class="desc">15个复习 + 5个新词，约15分钟</span>
      </button>
      <button class="action-btn" onclick="startSession('overdue')">
        <span class="title">⚠️ 补复习（超期词）</span>
        <span class="desc">集中复习已超期的词汇</span>
      </button>
      <button class="action-btn" onclick="startSession('new')">
        <span class="title">🆕 学新词</span>
        <span class="desc">学习还没掌握的单词</span>
      </button>
      <button class="action-btn" onclick="startSession('all')">
        <span class="title">🔄 随机练习</span>
        <span class="desc">从所有词中随机抽选</span>
      </button>
    </div>
  </div>

  <div class="review" id="review">
    <div class="review-header">
      <button class="back" onclick="goHome()">← 返回</button>
      <span class="progress" id="progress"></span>
    </div>
    <div class="progress-track"><div class="fill" id="progressFill"></div></div>
    <div class="mode-indicator" id="modeIndicator"></div>

    <div class="card" id="card">
      <div class="badge" id="badge"></div>
      <div id="cardContent"></div>
    </div>

    <div id="scoreArea" class="hidden">
      <div class="score-row">
        <button class="score-btn s1" onclick="selfScore(1)">1</button>
        <button class="score-btn s2" onclick="selfScore(2)">2</button>
        <button class="score-btn s3" onclick="selfScore(3)">3</button>
        <button class="score-btn s4" onclick="selfScore(4)">4</button>
        <button class="score-btn s5" onclick="selfScore(5)">5</button>
      </div>
      <div class="score-labels">
        <span>忘了</span><span>困难</span><span>一般</span><span>简单</span><span>完美</span>
      </div>
    </div>

    <div id="quizArea" class="hidden"></div>
  </div>

  <div class="summary" id="summary">
    <h2>本轮完成</h2>
    <div class="avg" id="avgScore"></div>
    <div class="avg-label" id="avgLabel"></div>
    <div class="list" id="resultList"></div>
    <button class="action-btn" style="margin-top:24px;text-align:center;" onclick="goHome()">返回主页</button>
  </div>

  <script>
    let mode='flashcard', words=[], idx=0, revealed=false, results=[];
    let quizDone=false, correctAnswer='';
    let audioCache = {}; // word -> audio URL

    const MODE_NAMES = {
      flashcard:'🃏 闪卡模式', fillblank:'📝 选词填空',
      dictation:'🎧 听写拼写', spelling:'🔤 拼写补全'
    };

    /* ===== Audio: real pronunciation via Free Dictionary API ===== */
    async function getAudioUrl(word) {
      if (audioCache[word]) return audioCache[word];
      try {
        const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!r.ok) return null;
        const data = await r.json();
        if (!Array.isArray(data) || !data[0]) return null;
        // Find the first audio URL with "us" or any English audio
        for (const phon of data[0].phonetics || []) {
          if (phon.audio && (phon.audio.includes('us') || phon.audio.includes('.mp3') || phon.audio.includes('.ogg'))) {
            audioCache[word] = phon.audio;
            return phon.audio;
          }
        }
        // Fallback: first available audio
        for (const phon of data[0].phonetics || []) {
          if (phon.audio) { audioCache[word] = phon.audio; return phon.audio; }
        }
      } catch(e) {}
      return null;
    }

    let currentAudio = null, currentPlayback = null;

    async function playAudio(word) {
      if (!word) return;
      // Stop any current playback
      if (currentPlayback) { try { currentPlayback.pause(); currentPlayback.currentTime=0; } catch{} }
      window.speechSynthesis.cancel();

      // Try to get real audio URL
      const url = await getAudioUrl(word);
      if (url) {
        currentPlayback = new Audio(url);
        currentPlayback.playbackRate = audioSpeed;
        try { await currentPlayback.play(); } catch(e) { console.log('audio play failed, fallback to TTS'); ttsFallback(word); return; }
        return;
      }
      // Fallback to TTS
      ttsFallback(word);
    }

    function ttsFallback(word) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US'; u.rate = audioSpeed * 0.85; u.pitch = 1;
      const voices = window.speechSynthesis.getVoices();
      const en = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'));
      if (en) u.voice = en;
      window.speechSynthesis.speak(u);
    }

    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    let audioSpeed = 0.75; // 75% speed for slow mode

    function audioControlsHTML(word) {
      return `<div class="audio-controls">
        <button class="audio-btn" title="播放发音" onclick="event.stopPropagation();playAudio('${word.replace(/'/g,"\\'")}')">🔊</button>
        <button class="speed-btn${audioSpeed<1?' active':''}" onclick="event.stopPropagation();setSpeed(this,0.75)">慢</button>
        <button class="speed-btn${audioSpeed>=1?' active':''}" onclick="event.stopPropagation();setSpeed(this,1)">常</button>
      </div>`;
    }

    function setSpeed(btn, speed) {
      audioSpeed = speed;
      btn.parentElement.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    /* ===== Mode / Navigation ===== */
    function selectMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===m));
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('review').classList.contains('active')) {
        if (mode==='flashcard' && !revealed && (e.code==='Space'||e.code==='Enter')) { e.preventDefault(); reveal(); }
        if (mode==='flashcard' && revealed && e.key>='1' && e.key<='5') selfScore(+e.key);
        if ((mode==='dictation'||mode==='spelling') && !quizDone && e.code==='Enter') checkInput();
        if (quizDone && e.code==='Enter') { e.preventDefault(); nextWord(); }
      }
      if (e.code==='Escape') goHome();
    });

    async function api(path, body) {
      const opts = body ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)} : {};
      const r = await fetch(path, opts);
      return r.json();
    }

    async function loadStats() {
      const s = await api('/api/stats');
      document.getElementById('subtitle').textContent = `${s.total} 词 · ${s.newW} 个新词 · ${s.overdue} 个超期`;
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-card overdue"><div class="num">${s.overdue}</div><div class="label">超期未复习</div></div>
        <div class="stat-card new"><div class="num">${s.newW}</div><div class="label">新词待学</div></div>
        <div class="stat-card mastered"><div class="num">${s.l3+s.l4+s.l5+s.l6}</div><div class="label">已掌握(L3+)</div></div>
      `;
      const bar = document.getElementById('masteryBar');
      const total = s.total || 1;
      const colors = ['#334155','#ef4444','#ea580c','#ca8a04','#22c55e','#16a34a','#2563eb','#1d4ed8'];
      const vals = [s.newW, s.l0, s.l1, s.l2, s.l3, s.l4, s.l5, s.l6];
      bar.innerHTML = vals.map((v,i) => `<div style="width:${v/total*100}%;background:${colors[i]}" title="${v}"></div>`).join('');
    }

    async function startSession(type) {
      document.getElementById('dashboard').style.display='none';
      document.getElementById('review').classList.add('active');
      document.getElementById('summary').classList.remove('active');
      document.getElementById('modeIndicator').textContent = MODE_NAMES[mode] || mode;

      const limit = type==='daily' ? 20 : 20;
      const data = await api('/api/words', { type, limit });
      if (!data.words || data.words.length===0) { alert('没有可学习的词汇'); goHome(); return; }

      words = data.words;
      idx = 0; results = [];
      showWord();
    }

    function fmtText(s) {
      if (!s) return '';
      s = s.replace(/ --- /g, '\n');
      s = s.replace(/【义项/g, '\n\n【义项');
      return s.trim();
    }

    /* ===== Flashcard ===== */
    function showWord() {
      if (idx >= words.length) { showSummary(); return; }
      revealed = false; quizDone = false; correctAnswer = '';
      const w = words[idx];

      document.getElementById('progress').textContent = `${idx+1} / ${words.length}`;
      document.getElementById('progressFill').style.width = `${idx/words.length*100}%`;
      document.getElementById('badge').textContent = w.masteryLevel || '新词';
      document.getElementById('badge').style.background = w.masteryLevel ? '#3b82f633' : '#334155';
      document.getElementById('badge').style.color = w.masteryLevel ? '#60a5fa' : '#94a3b8';

      const content = document.getElementById('cardContent');
      const scoreArea = document.getElementById('scoreArea');
      const quizArea = document.getElementById('quizArea');

      if (mode === 'flashcard') {
        quizArea.classList.add('hidden');
        scoreArea.classList.add('hidden');

        const tags = w.category ? (Array.isArray(w.category)?w.category.join(', '):w.category) : '';
        let tagsHtml = '';
        if (tags) tagsHtml += `<span class="tag">${tags}</span>`;
        if (w.difficulty) tagsHtml += `<span class="tag">${w.difficulty}</span>`;
        if (w.reviewCount > 0) tagsHtml += `<span class="tag">复习${w.reviewCount}次</span>`;

        let sections = '';
        [['Definition', fmtText(w.definition)],['Examples', fmtText(w.examples)],['Collocations', fmtText(w.collocations)],['Synonyms', fmtText(w.synonyms)],['Word Family', fmtText(w.wordFamily)]].forEach(([t,c]) => {
          if (c) sections += `<div class="section"><div class="section-title">${t}</div><div class="section-body">${c}</div></div>`;
        });

        content.innerHTML = `
          <div class="word">${w.word} ${audioControlsHTML(w.word)}</div>
          <div class="phonetic">${w.phonetic||''}</div>
          <div class="pos">${w.pos||''}</div>
          <div class="tags">${tagsHtml}</div>
          <div class="answer hidden" id="cAnswer">${sections}</div>
          <div class="hint" id="hint">点击显示释义</div>
        `;
        document.getElementById('card').style.cursor = 'pointer';
        document.getElementById('card').onclick = () => { if(!revealed) reveal(); };

      } else if (mode === 'fillblank') {
        scoreArea.classList.add('hidden');
        quizArea.classList.remove('hidden');
        setupFillBlank(w, content, quizArea);

      } else if (mode === 'dictation') {
        scoreArea.classList.add('hidden');
        quizArea.classList.remove('hidden');
        setupDictation(w, content, quizArea);

      } else if (mode === 'spelling') {
        scoreArea.classList.add('hidden');
        quizArea.classList.remove('hidden');
        setupSpelling(w, content, quizArea);
      }
    }

    function reveal() {
      if (revealed) return;
      revealed = true;
      const w = words[idx];
      playAudio(w.word);
      const ans = document.getElementById('cAnswer');
      if (ans) ans.classList.remove('hidden');
      const hint = document.getElementById('hint');
      if (hint) hint.classList.add('hidden');
      document.getElementById('scoreArea').classList.remove('hidden');
    }

    async function selfScore(s) {
      if (!revealed) return;
      const w = words[idx];
      document.getElementById('scoreArea').style.opacity = '.5';
      const r = await api('/api/review', { recordId: w.recordId, score: s, currentMasteryIndex: w.masteryIndex });
      document.getElementById('scoreArea').style.opacity = '1';
      results.push({ word: w.word, score: s, newLevel: r.newMasteryLevel || '' });
      idx++;
      showWord();
    }

    /* ===== Fill-in-blank ===== */
    function getSentence(w) {
      if (!w.examples) return null;
      const lines = w.examples.replace(/ --- /g, '\n').split('\n').map(l => l.trim()).filter(l => l && l.length > 10);
      const word = w.word.toLowerCase();
      for (const line of lines) {
        const clean = line.replace(/^Sense\s*\d+[:\s]*/i, '').trim();
        if (clean.length < 10) continue;
        if (clean.toLowerCase().includes(word)) return clean;
      }
      return null;
    }

    function makeBlank(sentence, word) {
      const regex = new RegExp('\\b' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'i');
      return sentence.replace(regex, '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    }

    function getDistractors(w) {
      const others = words.filter(x => x.recordId !== w.recordId && x.word.length > 2);
      if (others.length === 0) return ['unknown','word','test'];
      const shuffled = [...others].sort(() => Math.random()-0.5);
      return shuffled.slice(0, 3).map(x => x.word);
    }

    function setupFillBlank(w, content, quizArea) {
      correctAnswer = w.word;
      const sentence = getSentence(w);

      if (!sentence) {
        content.innerHTML = `<div class="def-hint">${fmtText(w.definition)}</div>`;
        quizArea.innerHTML = `
          <div class="replay-row">${audioControlsHTML(w.word)}<span class="replay-text">听发音</span></div>
          <div class="fib-hint">该词暂无例句，请根据释义输入单词</div>
          <div class="input-area">
            <input type="text" class="word-input" id="fibInput" autocomplete="off" autocapitalize="none" spellcheck="false">
            <button class="submit-btn" id="fibSubmit" onclick="checkFillBlank()">确认</button>
          </div>
          <div class="result-msg" id="fibResult"></div>
        `;
        setTimeout(() => { const inp = document.getElementById('fibInput'); if(inp) inp.focus(); }, 100);
        return;
      }

      const options = [w.word, ...getDistractors(w)].sort(() => Math.random()-0.5);
      const blankHtml = makeBlank(sentence, w.word);

      content.innerHTML = `
        <div class="replay-row">${audioControlsHTML(w.word)}</div>
        <div class="def-hint" style="font-size:14px;color:#64748b;margin-bottom:16px;">${w.pos||''}${w.pos?' · ':''}${w.phonetic||''}</div>
        <div class="fib-sentence">${blankHtml}</div>
        <div class="def-hint" style="font-size:14px;color:#64748b;margin-bottom:8px;">${fmtText(w.definition).substring(0,120)}</div>
      `;

      quizArea.innerHTML = `
        <div class="options-grid">
          ${options.map(o => `<button class="option-btn" onclick="pickOption(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
        </div>
        <div class="result-msg" id="fibResult"></div>
      `;
      setTimeout(() => playAudio(w.word), 200);
    }

    async function pickOption(btn, chosen) {
      if (quizDone) return;
      quizDone = true;
      const isCorrect = chosen.toLowerCase() === correctAnswer.toLowerCase();
      const w = words[idx];

      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) {
        document.querySelectorAll('.option-btn').forEach(b => {
          if (b.textContent === correctAnswer) b.classList.add('correct');
        });
      }
      document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

      const score = isCorrect ? 5 : 1;
      const r = await api('/api/review', { recordId: w.recordId, score, currentMasteryIndex: w.masteryIndex });
      results.push({ word: w.word, score, newLevel: r.newMasteryLevel || '' });

      playAudio(correctAnswer);

      const msg = document.getElementById('fibResult');
      msg.className = 'result-msg ' + (isCorrect ? 'correct' : 'wrong');
      msg.textContent = isCorrect ? '✅ 正确！' : `❌ 正确答案：${correctAnswer}`;

      setTimeout(() => { idx++; showWord(); }, 1500);
    }

    /* ===== Dictation ===== */
    function setupDictation(w, content, quizArea) {
      correctAnswer = w.word;
      const def = fmtText(w.definition);

      content.innerHTML = `
        <div class="def-hint">${def}</div>
        <div class="phonetic-hint">${w.pos||''}</div>
        <div class="phonetic-hint" style="font-size:14px;color:#475569;">词数：${w.word.length} 个字母</div>
      `;

      quizArea.innerHTML = `
        <div class="replay-row">${audioControlsHTML(w.word)}<span class="replay-text">点击听发音，可多次点击</span></div>
        <div class="input-area">
          <input type="text" class="word-input" id="dictInput" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="输入单词...">
          <button class="submit-btn" id="dictSubmit" onclick="checkDictation()">确认</button>
        </div>
        <div class="result-msg" id="dictResult"></div>
        <div id="dictAnswer" class="hidden" style="text-align:center;">
          <div style="font-size:24px;font-weight:700;color:#f8fafc;margin-bottom:8px;" id="dictAnswerWord"></div>
          <div style="font-size:14px;color:#64748b;margin-bottom:16px;" id="dictAnswerPhonetic"></div>
          <button class="next-btn" onclick="nextWord()">下一个 →</button>
        </div>
      `;
      setTimeout(() => playAudio(w.word), 300);
      setTimeout(() => { const inp = document.getElementById('dictInput'); if(inp) inp.focus(); }, 100);
    }

    async function checkDictation() {
      if (quizDone) return;
      const input = document.getElementById('dictInput');
      const answer = input.value.trim().toLowerCase();
      if (!answer) return;

      quizDone = true;
      const w = words[idx];
      const score = calcScore(answer, correctAnswer.toLowerCase());
      const r = await api('/api/review', { recordId: w.recordId, score, currentMasteryIndex: w.masteryIndex });
      results.push({ word: w.word, score, newLevel: r.newMasteryLevel || '' });

      input.disabled = true;
      document.getElementById('dictSubmit').disabled = true;
      input.classList.add(score >= 3 ? 'correct' : 'wrong');

      const msg = document.getElementById('dictResult');
      msg.className = 'result-msg ' + (score >= 3 ? 'correct' : 'wrong');
      msg.textContent = score >= 5 ? '✅ 完全正确！' : score >= 3 ? '⚠️ 接近了' : '❌ 不对';

      playAudio(correctAnswer);

      document.getElementById('dictAnswerWord').textContent = correctAnswer;
      document.getElementById('dictAnswerPhonetic').textContent = `${w.phonetic||''} ${w.pos||''}`;
      document.getElementById('dictAnswer').classList.remove('hidden');

      let sections = '';
      [['Definition', fmtText(w.definition)],['Examples', fmtText(w.examples)],['Collocations', fmtText(w.collocations)]].forEach(([t,c]) => {
        if (c) sections += `<div class="section" style="text-align:left;margin-top:12px;padding-top:12px;border-top:1px solid #334155;"><div class="section-title">${t}</div><div class="section-body">${c}</div></div>`;
      });
      document.getElementById('cAnswer').innerHTML = sections;
      document.getElementById('cAnswer').classList.remove('hidden');
    }

    /* ===== Spelling ===== */
    function maskWord(word) {
      const len = word.length;
      if (len <= 2) return { masked: word.split('').map(c => '_').join(' '), reveal: [] };
      const showCount = Math.max(2, Math.ceil(len * 0.4));
      const indices = [0, len-1];
      const available = Array.from({length:len-2}, (_,i) => i+1);
      available.sort(() => Math.random()-0.5);
      indices.push(...available.slice(0, showCount-2));
      return {
        masked: word.split('').map((c,i) => indices.includes(i) ? c : '_').join(' '),
        indices
      };
    }

    function setupSpelling(w, content, quizArea) {
      correctAnswer = w.word;
      const { masked } = maskWord(w.word);
      const def = fmtText(w.definition);

      content.innerHTML = `
        <div class="replay-row">${audioControlsHTML(w.word)}</div>
        <div class="def-hint">${def}</div>
        <div class="letter-hint">${masked}</div>
        <div class="phonetic-hint">${w.phonetic||''} ${w.pos||''}</div>
      `;

      quizArea.innerHTML = `
        <div class="input-area">
          <input type="text" class="word-input" id="spellInput" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="补全单词...">
          <button class="submit-btn" id="spellSubmit" onclick="checkSpelling()">确认</button>
        </div>
        <div class="result-msg" id="spellResult"></div>
        <div id="spellAnswer" class="hidden" style="text-align:center;">
          <div style="font-size:24px;font-weight:700;color:#f8fafc;margin-bottom:8px;" id="spellAnswerWord"></div>
          <button class="next-btn" onclick="nextWord()">下一个 →</button>
        </div>
      `;
      setTimeout(() => { const inp = document.getElementById('spellInput'); if(inp) inp.focus(); }, 100);
    }

    async function checkSpelling() {
      if (quizDone) return;
      const input = document.getElementById('spellInput');
      const answer = input.value.trim().toLowerCase();
      if (!answer) return;

      quizDone = true;
      const w = words[idx];
      const score = calcScore(answer, correctAnswer.toLowerCase());
      const r = await api('/api/review', { recordId: w.recordId, score, currentMasteryIndex: w.masteryIndex });
      results.push({ word: w.word, score, newLevel: r.newMasteryLevel || '' });

      input.disabled = true;
      document.getElementById('spellSubmit').disabled = true;
      input.classList.add(score >= 3 ? 'correct' : 'wrong');

      const msg = document.getElementById('spellResult');
      msg.className = 'result-msg ' + (score >= 3 ? 'correct' : 'wrong');
      msg.textContent = score >= 5 ? '✅ 完全正确！' : score >= 3 ? '⚠️ 接近了' : '❌ 不对';

      playAudio(correctAnswer);

      document.getElementById('spellAnswerWord').textContent = correctAnswer;
      document.getElementById('spellAnswer').classList.remove('hidden');

      let sections = '';
      [['Definition', fmtText(w.definition)],['Examples', fmtText(w.examples)]].forEach(([t,c]) => {
        if (c) sections += `<div class="section" style="text-align:left;margin-top:12px;padding-top:12px;border-top:1px solid #334155;"><div class="section-title">${t}</div><div class="section-body">${c}</div></div>`;
      });
      document.getElementById('cAnswer').innerHTML = sections;
      document.getElementById('cAnswer').classList.remove('hidden');
    }

    /* ===== Helpers ===== */
    function calcScore(answer, correct) {
      if (answer === correct) return 5;
      if (answer.length === correct.length) {
        let diff = 0;
        for (let i=0; i<correct.length; i++) { if (answer[i]!==correct[i]) diff++; }
        if (diff===1) return 4;
        if (diff===2) return 3;
      }
      const dist = levenshtein(answer, correct);
      if (dist===1) return 4;
      if (dist===2) return 3;
      if (dist===3) return 2;
      return 1;
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n; if (!n) return m;
      const dp = Array.from({length:m+1}, ()=>Array(n+1).fill(0));
      for (let i=0;i<=m;i++) dp[i][0]=i;
      for (let j=0;j<=n;j++) dp[0][j]=j;
      for (let i=1;i<=m;i++) {
        for (let j=1;j<=n;j++) {
          dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])+1;
        }
      }
      return dp[m][n];
    }

    function nextWord() {
      idx++;
      showWord();
    }

    function showSummary() {
      document.getElementById('review').classList.remove('active');
      document.getElementById('summary').classList.add('active');
      const avg = results.length ? (results.reduce((a,r)=>a+r.score,0)/results.length).toFixed(1) : '0';
      document.getElementById('avgScore').textContent = `${avg} / 5`;
      document.getElementById('avgLabel').textContent = `${results.length} 个词 · ${MODE_NAMES[mode]||mode} · 已保存到飞书`;
      const colors = ['#ef4444','#ea580c','#ca8a04','#22c55e','#2563eb'];
      document.getElementById('resultList').innerHTML = results.map(r =>
        `<div class="item"><span>${r.word}</span><span class="score" style="color:${colors[r.score-1]}">${r.score}/5 ${r.newLevel?'→ '+r.newLevel:''}</span></div>`
      ).join('');
    }

    function goHome() {
      document.getElementById('dashboard').style.display='';
      document.getElementById('review').classList.remove('active');
      document.getElementById('summary').classList.remove('active');
      loadStats();
    }

    loadStats();
  </script>
